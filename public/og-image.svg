  <line x1="0" y1="1" x2="1200" y2="1" stroke="#1E2A35" stroke-width="1"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#1E2A35" stroke-width="1"/>
  <line x1="1" y1="0" x2="1" y2="630" stroke="#1E2A35" stroke-width="1"/>
  <line x1="1199" y1="0" x2="1199" y2="630" stroke="#1E2A35" stroke-width="1"/>

  <!-- Top border accent -->
